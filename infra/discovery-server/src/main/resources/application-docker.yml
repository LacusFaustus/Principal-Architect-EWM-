server:
  port: 8761

eureka:
  instance:
    hostname: discovery-server
    prefer-ip-address: true
  client:
    register-with-eureka: false
    fetch-registry: false
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
  server:
    enable-self-preservation: true
    renewal-percent-threshold: 0.85
    eviction-interval-timer-in-ms: 60000

spring:
  application:
    name: discovery-server
  zipkin:
    base-url: http://zipkin:9411
    sender:
      type: web
    service:
      name: discovery-server
  sleuth:
    sampler:
      probability: 1.0
    trace-id128: true
    baggage:
      remote-fields:
        - user-id
        - correlation-id
    log:
      slf4j:
        enabled: true
    propagation:
      type: w3c

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: discovery-server
  tracing:
    enabled: true
    sampling:
      probability: 1.0

logging:
  level:
    com.netflix.eureka: INFO
    com.netflix.discovery: INFO
    org.springframework.cloud.sleuth: DEBUG
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr([${spring.zipkin.service.name:${spring.application.name:-}},%X{traceId:-},%X{spanId:-},%X{X-B3-Sampled:-}]){yellow} %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"