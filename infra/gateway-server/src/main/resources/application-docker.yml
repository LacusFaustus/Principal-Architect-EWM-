server:
  port: 8080

spring:
  application:
    name: gateway-server
  cloud:
    config:
      enabled: false
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true
            maxAge: 3600

  # Redis configuration for Rate Limiter
  redis:
    host: ${REDIS_HOST:redis}
    port: ${REDIS_PORT:6379}
    password: ${REDIS_PASSWORD:redispass}
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5

  # JWT Configuration
  jwt:
    secret: ${JWT_SECRET:your-super-secret-jwt-key-at-least-32-characters-long}

  # Zipkin for tracing
  zipkin:
    base-url: http://zipkin:9411
    sender:
      type: web
    service:
      name: gateway-server

  # Sleuth for distributed tracing
  sleuth:
    sampler:
      probability: 1.0
    trace-id128: true
    baggage:
      remote-fields:
        - user-id
        - correlation-id
        - tenant-id
    log:
      slf4j:
        enabled: true
    propagation:
      type: w3c

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    metadata-map:
      zone: docker
      version: ${spring.application.version:latest}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: gateway-server
  tracing:
    enabled: true
    sampling:
      probability: 1.0

logging:
  level:
    org.springframework.cloud.gateway: INFO
    org.springframework.web: INFO
    org.springframework.cloud.sleuth: DEBUG
    ru.practicum.gateway.security: DEBUG
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr([${spring.zipkin.service.name:${spring.application.name:-}},%X{traceId:-},%X{spanId:-},%X{X-B3-Sampled:-}]){yellow} %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"