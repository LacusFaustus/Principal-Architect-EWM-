apiVersion: networking.istio.io/v1beta1
kind: VirtualService
metadata:
  name: ewm-event-service
  namespace: production
spec:
  hosts:
    - event-service
  http:
    - match:
        - headers:
            x-canary:
              exact: "true"
      route:
        - destination:
            host: event-service
            subset: v2
          weight: 100
    - route:
        - destination:
            host: event-service
            subset: v1
          weight: 90
        - destination:
            host: event-service
            subset: v2
          weight: 10
---
apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: ewm-event-service
  namespace: production
spec:
  host: event-service
  subsets:
    - name: v1
      labels:
        version: v1
    - name: v2
      labels:
        version: v2
  trafficPolicy:
    connectionPool:
      tcp:
        maxConnections: 100
    loadBalancer:
      simple: ROUND_ROBIN
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 30s
      baseEjectionTime: 60s