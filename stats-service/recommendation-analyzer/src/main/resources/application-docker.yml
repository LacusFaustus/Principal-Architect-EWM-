server:
  port: 8088

spring:
  application:
    name: recommendation-analyzer
  datasource:
    url: jdbc:postgresql://stats-db:5432/statsdb
    username: stats
    password: statspass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
  kafka:
    bootstrap-servers: kafka:9092
    consumer:
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "*"
        spring.json.type.mapping: "userAction:ru.practicum.ewm.stats.avro.UserActionAvro,eventSimilarity:ru.practicum.ewm.stats.avro.EventSimilarityAvro"
  zipkin:
    base-url: http://zipkin:9411
    sender:
      type: web
    service:
      name: recommendation-analyzer
  sleuth:
    sampler:
      probability: 1.0
    trace-id128: true
    baggage:
      remote-fields:
        - user-id
        - correlation-id
    log:
      slf4j:
        enabled: true
    propagation:
      type: w3c

kafka:
  topics:
    user-actions: stats.user-actions.v1
    events-similarity: stats.events-similarity.v1

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    instance-id: "${spring.application.name}:${random.value}"
    metadata-map:
      zone: docker
      version: ${spring.application.version:latest}

grpc:
  server:
    port: 0

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: recommendation-analyzer
  tracing:
    enabled: true
    sampling:
      probability: 1.0

logging:
  level:
    ru.practicum: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql: TRACE
    org.apache.kafka: WARN
    org.springframework.cloud.sleuth: DEBUG
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr([${spring.zipkin.service.name:${spring.application.name:-}},%X{traceId:-},%X{spanId:-},%X{X-B3-Sampled:-}]){yellow} %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"