server:
  port: 8086

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:postgresql://user-db:5432/userdb
    username: user
    password: userpass
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        jdbc:
          batch_size: 50
        order_inserts: true
        order_updates: true
  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
  redis:
    host: redis
    port: 6379
    password: redispass
    timeout: 2000ms
    lettuce:
      pool:
        max-active: 20
        max-idle: 10
        min-idle: 5
  cache:
    type: redis
    redis:
      time-to-live: 600000
      cache-null-values: false
  zipkin:
    base-url: http://zipkin:9411
    sender:
      type: web
    service:
      name: auth-service
  sleuth:
    sampler:
      probability: 1.0
    trace-id128: true
    baggage:
      remote-fields:
        - user-id
        - correlation-id
    log:
      slf4j:
        enabled: true
    propagation:
      type: w3c

eureka:
  client:
    service-url:
      defaultZone: http://discovery-server:8761/eureka/
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true
    lease-renewal-interval-in-seconds: 10
    lease-expiration-duration-in-seconds: 30
    metadata-map:
      zone: docker
      version: ${spring.application.version:latest}

jwt:
  secret: ${JWT_SECRET:your-super-secret-jwt-key-at-least-32-characters-long}
  expiration: ${JWT_EXPIRATION:86400000}
  refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    export:
      prometheus:
        enabled: true
    tags:
      application: auth-service
  tracing:
    enabled: true
    sampling:
      probability: 1.0

logging:
  level:
    ru.practicum: INFO
    org.springframework.security: DEBUG
    org.springframework.cloud.sleuth: DEBUG
  pattern:
    console: "%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(${LOG_LEVEL_PATTERN:-%5p}) %clr([${spring.zipkin.service.name:${spring.application.name:-}},%X{traceId:-},%X{spanId:-},%X{X-B3-Sampled:-}]){yellow} %clr(${PID:- }){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:-%wEx}"