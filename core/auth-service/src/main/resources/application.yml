server:
  port: 8086

spring:
  application:
    name: auth-service
  datasource:
    url: jdbc:h2:mem:authdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true
  h2:
    console:
      enabled: true
      path: /h2-console
  redis:
    host: localhost
    port: 6379
    password: redispass
  liquibase:
    enabled: false

jwt:
  secret: your-super-secret-jwt-key-at-least-32-characters-long
  expiration: 86400000
  refresh-expiration: 604800000

eureka:
  client:
    enabled: false

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

logging:
  level:
    ru.practicum: DEBUG
    org.springframework.security: DEBUG