apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: user-service
  description: User management microservice for EWM platform
  annotations:
    github.com/project-slug: practicum/user-service
    sonarqube.org/project-key: practicum_user-service
    snyk.io/org: practicum
    backstage.io/kubernetes-id: user-service
    backstage.io/techdocs-ref: dir:.
    backstage.io/managed-by: backstage
    backstage.io/view-url: https://github.com/practicum/user-service
    backstage.io/edit-url: https://github.com/practicum/user-service/edit/main/README.md
  labels:
    tier: core
    language: java
    framework: spring-boot
  tags:
    - java
    - spring-boot
    - microservice
    - postgresql
spec:
  type: service
  lifecycle: production
  owner: team-platform
  system: ewm-platform
  dependsOn:
    - resource:postgres-user-db
    - resource:redis-cache
    - resource:discovery-server
    - resource:config-server
  providesApis:
    - user-api
  consumesApis:
    - auth-api
  deployment:
    replicas: 2
    environment: production
    kubernetes:
      namespace: production
---
apiVersion: backstage.io/v1alpha1
kind: Component
metadata:
  name: event-service
