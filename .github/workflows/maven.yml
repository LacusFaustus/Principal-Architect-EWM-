name: Java CI with Maven

on:
  push:
    branches: [ "main", "Principal-Architect-EWM-" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven (skip checkstyle)
        run: mvn clean compile -DskipTests -Dcheckstyle.skip=true

      - name: Run tests
        run: mvn test -DskipTests=false -Dcheckstyle.skip=true