name: Java CI with Maven

on:
  push:
    branches: [ "main", "Principal-Architect-EWM-", "develop", "microservices", "spring-cloud", "recommendations" ]
  pull_request:
    branches: [ "main", "Principal-Architect-EWM-" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build with Maven
        run: mvn clean compile -DskipTests

      - name: Run tests
        run: mvn test -DskipTests=false