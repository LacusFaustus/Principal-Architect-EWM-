name: Java CI with Maven

on:
  push:
    branches: [ "main", "develop", "feature/*" ]
  pull_request:
    branches: [ "main", "develop" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [21]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK ${{ matrix.java }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java }}
          distribution: 'temurin'
          cache: maven

      - name: Cache Maven dependencies
        uses: actions/cache@v4
        with:
          path: ~/.m2
          key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
          restore-keys: ${{ runner.os }}-m2

      - name: Build entire project
        run: mvn clean install -DskipTests -U

      - name: Run tests with coverage
        run: mvn test jacoco:report

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: |
            **/target/site/jacoco/
            !**/target/site/jacoco/jacoco-sessions.xml

      - name: Run Checkstyle
        run: mvn checkstyle:check -Dcheckstyle.skip=false || echo "Checkstyle warnings found"

      - name: Run SpotBugs
        run: mvn spotbugs:check || echo "SpotBugs warnings found"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            **/target/*.jar
            **/target/site/jacoco/
          retention-days: 7

      - name: Notify on failure
        if: failure()
        run: echo "❌ Build failed! Check logs for details."