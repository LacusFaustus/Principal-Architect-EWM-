name: Performance Tests

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to test'
        required: true
        default: 'development'
        type: choice
        options:
          - development
          - staging
  schedule:
    - cron: '0 2 * * *'  # Run daily at 2 AM

jobs:
  performance-test:
    name: Run Performance Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Install JMeter
        run: |
          wget https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz
          tar -xzf apache-jmeter-5.6.3.tgz
          sudo mv apache-jmeter-5.6.3 /opt/jmeter
          echo "/opt/jmeter/bin" >> $GITHUB_PATH

      - name: Run smoke performance test
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'development'
        run: |
          jmeter -n -t performance-tests/jmeter/ewm-load-test.jmx \
            -JTHREADS=10 \
            -JRAMP_UP=5 \
            -JLOOP_COUNT=10 \
            -JBASE_URL=http://localhost:8080 \
            -l results/smoke-test-results.jtl \
            -e -o results/smoke-report

      - name: Run full performance test
        if: github.event_name == 'schedule' || github.event.inputs.environment == 'staging'
        run: |
          jmeter -n -t performance-tests/jmeter/ewm-load-test.jmx \
            -JTHREADS=100 \
            -JRAMP_UP=30 \
            -JLOOP_COUNT=100 \
            -JBASE_URL=https://staging.ewm.example.com \
            -l results/full-test-results.jtl \
            -e -o results/full-report

      - name: Upload performance test results
        uses: actions/upload-artifact@v4
        with:
          name: performance-test-results
          path: results/

      - name: Parse and check results
        run: |
          # Parse JMeter results and check thresholds
          # Fail if error rate > 1% or response time > 200ms
          python scripts/parse-jmeter-results.py results/