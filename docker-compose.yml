services:
  # === INFRASTRUCTURE ===
  discovery-server:
    build: ./infra/discovery-server
    container_name: discovery-server
    ports:
      - "8761:8761"
    environment:
      - SPRING_PROFILES_ACTIVE=docker
    networks:
      - ewm-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8761/actuator/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  config-server:
    build: ./infra/config-server
    container_name: config-server
    ports:
      - "8082:8082"
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - ewm-network

  gateway-server:
    build: ./infra/gateway-server
    container_name: gateway-server
    ports:
      - "8080:8080"
    depends_on:
      discovery-server:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
    networks:
      - ewm-network

  # === KAFKA STACK ===
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - ewm-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - ewm-network

  schema-registry:
    image: confluentinc/cp-schema-registry:7.4.0
    container_name: schema-registry
    ports:
      - "8081:8081"
    depends_on:
      - kafka
      - zookeeper
    environment:
      SCHEMA_REGISTRY_HOST_NAME: schema-registry
      SCHEMA_REGISTRY_KAFKASTORE_BOOTSTRAP_SERVERS: PLAINTEXT://kafka:9092
      SCHEMA_REGISTRY_LISTENERS: http://0.0.0.0:8081
    networks:
      - ewm-network

  kafka-setup:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-setup
    depends_on:
      - kafka
      - schema-registry
    entrypoint: ["/bin/sh", "-c"]
    command: |
      "
      echo 'Waiting for Kafka to be ready...'
      sleep 15
      echo 'Creating topics...'
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic stats.user-actions.v1 --partitions 3 --replication-factor 1
      kafka-topics --bootstrap-server kafka:9092 --create --if-not-exists --topic stats.events-similarity.v1 --partitions 3 --replication-factor 1
      echo 'Topics created successfully'
      echo 'Schema Registry ready at http://schema-registry:8081'
      "
    networks:
      - ewm-network

  # === DATABASES ===
  user-db:
    image: postgres:15-alpine
    container_name: user-db
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: userpass
      POSTGRES_DB: userdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d userdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ewm-network

  event-db:
    image: postgres:15-alpine
    container_name: event-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: event
      POSTGRES_PASSWORD: eventpass
      POSTGRES_DB: eventdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U event -d eventdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ewm-network

  request-db:
    image: postgres:15-alpine
    container_name: request-db
    ports:
      - "5435:5432"
    environment:
      POSTGRES_USER: request
      POSTGRES_PASSWORD: requestpass
      POSTGRES_DB: requestdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U request -d requestdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ewm-network

  comment-db:
    image: postgres:15-alpine
    container_name: comment-db
    ports:
      - "5436:5432"
    environment:
      POSTGRES_USER: comment
      POSTGRES_PASSWORD: commentpass
      POSTGRES_DB: commentdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U comment -d commentdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ewm-network

  stats-db:
    image: postgres:15-alpine
    container_name: stats-db
    ports:
      - "5434:5432"
    environment:
      POSTGRES_USER: stats
      POSTGRES_PASSWORD: statspass
      POSTGRES_DB: statsdb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stats -d statsdb"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - ewm-network

  # === CORE SERVICES ===
  user-service:
    build: ./core/user-service
    container_name: user-service
    depends_on:
      user-db:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://user-db:5432/userdb
    networks:
      - ewm-network

  event-service:
    build: ./core/event-service
    container_name: event-service
    depends_on:
      event-db:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://event-db:5432/eventdb
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - ewm-network

  request-service:
    build: ./core/request-service
    container_name: request-service
    depends_on:
      request-db:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://request-db:5432/requestdb
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
    networks:
      - ewm-network

  comment-service:
    build: ./core/comment-service
    container_name: comment-service
    depends_on:
      comment-db:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://comment-db:5432/commentdb
    networks:
      - ewm-network

  stats-server:
    build: ./stats-service/stat-svc-service
    container_name: stats-server
    depends_on:
      stats-db:
        condition: service_healthy
      discovery-server:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_DATASOURCE_URL=jdbc:postgresql://stats-db:5432/statsdb
    networks:
      - ewm-network

  # === RECOMMENDATION SERVICES ===
  recommendation-collector:
    build: ./stats-service/recommendation-collector
    container_name: recommendation-collector
    depends_on:
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_started
      schema-registry:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL=http://schema-registry:8081
    networks:
      - ewm-network

  recommendation-aggregator:
    build: ./stats-service/recommendation-aggregator
    container_name: recommendation-aggregator
    depends_on:
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_started
      schema-registry:
        condition: service_started
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL=http://schema-registry:8081
    networks:
      - ewm-network

  recommendation-analyzer:
    build: ./stats-service/recommendation-analyzer
    container_name: recommendation-analyzer
    depends_on:
      discovery-server:
        condition: service_healthy
      kafka:
        condition: service_started
      schema-registry:
        condition: service_started
      stats-db:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://discovery-server:8761/eureka/
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:9092
      - SPRING_KAFKA_PROPERTIES_SCHEMA_REGISTRY_URL=http://schema-registry:8081
      - SPRING_DATASOURCE_URL=jdbc:postgresql://stats-db:5432/statsdb
    networks:
      - ewm-network

networks:
  ewm-network:
    driver: bridge