apiVersion: autoscaling.openshift.io/v1
kind: ClusterAutoscaler
metadata:
  name: default
spec:
  podPriorityThreshold: -10
  resourceLimits:
    maxNodesTotal: 100
    cores:
      min: 10
      max: 100
    memory:
      min: 20
      max: 400
  scaleDown:
    enabled: true
    delayAfterAdd: 10m
    delayAfterDelete: 5m
    delayAfterFailure: 3m
    unneededTime: 5m
---
apiVersion: monitoring.coreos.com/v1
kind: PrometheusRule
metadata:
  name: auto-remediation-rules
  namespace: production
spec:
  groups:
    - name: auto-remediation
      rules:
        - alert: HighErrorRate
          expr: |
            sum(rate(http_server_requests_seconds_count{status=~"5.."}[5m])) 
            / sum(rate(http_server_requests_seconds_count[5m])) > 0.05
          for: 2m
          labels:
            severity: warning
            auto_remediate: "true"
          annotations:
            summary: "High error rate detected"
            description: "Error rate is {{ $value }}%"
            action: "restart_deployment"

        - alert: HighLatency
          expr: |
            histogram_quantile(0.95, sum(rate(http_server_requests_seconds_bucket[5m])) by (le, service)) > 1
          for: 3m
          labels:
            severity: warning
            auto_remediate: "true"
          annotations:
            summary: "High latency detected"
            description: "P95 latency is {{ $value }}s"
            action: "scale_up"

        - alert: PodCrashLoop
          expr: |
            kube_pod_container_status_restarts_total > 5
          for: 5m
          labels:
            severity: critical
            auto_remediate: "true"
          annotations:
            summary: "Pod in crash loop"
            description: "Pod {{ $labels.pod }} has restarted {{ $value }} times"
            action: "escalate"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: auto-remediation-operator
  namespace: production
data:
  operator.yaml: |
    apiVersion: apps/v1
    kind: Deployment
    metadata:
      name: auto-remediation-operator
    spec:
      replicas: 1
      selector:
        matchLabels:
          app: auto-remediation-operator
      template:
        metadata:
          labels:
            app: auto-remediation-operator
        spec:
          containers:
            - name: operator
              image: practicum/auto-remediation-operator:latest
              env:
                - name: KUBERNETES_NAMESPACE
                  value: production
                - name: SLACK_WEBHOOK_URL
                  value: ${SLACK_WEBHOOK_URL}